  <rect x="376" y="562" width="1" height="45" fill="#1a1a1a"/>
  <rect x="379" y="562" width="2" height="45" fill="#1a1a1a"/>
  <text x="340" y="621" font-family="Arial, sans-serif" font-size="7" fill="#1a1a1a" text-anchor="middle">8 801234 567890</text>

  <!-- Bottom bar -->
  <rect x="0" y="694" width="420" height="6" fill="#1a1a1a" rx="0"/>
