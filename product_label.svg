<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 700" width="420" height="700">
  <!-- Background -->
  <rect width="420" height="700" fill="#FFFFFF" rx="8"/>
  <rect width="420" height="700" fill="none" rx="8" stroke="#DEDEDD" stroke-width="1"/>

  <!-- Top brand color bar -->
  <rect width="420" height="6" fill="#1a1a1a" rx="0"/>

  <!-- Brand watermark pattern -->
  <rect x="0" y="6" width="420" height="120" fill="#F9F9F8"/>

  <!-- Brand logo area -->
  <text x="210" y="46" font-family="Georgia, serif" font-size="10" fill="#9F9F9F" text-anchor="middle" letter-spacing="4">SEOUL BEAUTY LAB</text>

  <!-- Product name -->
  <text x="210" y="88" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#1a1a1a" text-anchor="middle" letter-spacing="-1">AQUA GLOW</text>
  <text x="210" y="116" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#1a1a1a" text-anchor="middle" letter-spacing="-1">SERUM</text>

  <!-- Tagline -->
  <text x="210" y="145" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B" text-anchor="middle" letter-spacing="3">HYDRATING &amp; BRIGHTENING</text>

  <!-- Divider line -->
  <line x1="40" y1="158" x2="380" y2="158" stroke="#DEDEDD" stroke-width="0.5"/>

  <!-- Korean product description -->
  <text x="210" y="184" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle">피부 재생을 도와 주름을 치료합니다</text>
  <text x="210" y="202" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B" text-anchor="middle">트러블이 있는 피부를 완치시켜 드립니다</text>

  <!-- Divider -->
  <line x1="40" y1="216" x2="380" y2="216" stroke="#DEDEDD" stroke-width="0.5"/>

  <!-- Net Weight area -->
  <text x="40" y="240" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a">Net Weight: 150ml</text>
  <text x="40" y="256" font-family="Arial, sans-serif" font-size="9" fill="#9F9F9F">(oz 단위 누락됨)</text>

  <!-- Divider -->
  <line x1="40" y1="268" x2="380" y2="268" stroke="#DEDEDD" stroke-width="0.5"/>

  <!-- Ingredients section -->
  <text x="40" y="290" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1a1a1a" letter-spacing="1">INGREDIENTS / 전성분</text>
  <text x="40" y="308" font-family="Arial, sans-serif" font-size="8.5" fill="#6B6B6B">Aqua, Glycerln, Niacinamide, Hyaluronic Acid,</text>
  <text x="40" y="322" font-family="Arial, sans-serif" font-size="8.5" fill="#6B6B6B">Panthenol, Allantoin, Centella Asiatica Extract,</text>
  <text x="40" y="336" font-family="Arial, sans-serif" font-size="8.5" fill="#6B6B6B">Sodium PCA, Betaine, Ceramide NP,</text>
  <text x="40" y="350" font-family="Arial, sans-serif" font-size="8.5" fill="#6B6B6B">Adenosine, Tocopherol, Carbomer,</text>
  <text x="40" y="364" font-family="Arial, sans-serif" font-size="8.5" fill="#6B6B6B">Sodium Hydroxide, Ethylhexylglycerin,</text>
  <text x="40" y="378" font-family="Arial, sans-serif" font-size="8.5" fill="#6B6B6B">Phenoxyethanol, Limonene, Linalool,</text>
  <text x="40" y="392" font-family="Arial, sans-serif" font-size="8.5" fill="#6B6B6B">Fragrance / 향료</text>

  <!-- Divider -->
  <line x1="40" y1="404" x2="380" y2="404" stroke="#DEDEDD" stroke-width="0.5"/>

  <!-- How to use -->
  <text x="40" y="424" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1a1a1a" letter-spacing="1">HOW TO USE / 사용법</text>
  <text x="40" y="440" font-family="Arial, sans-serif" font-size="8.5" fill="#6B6B6B">클렌징 후 적당량을 취하여 얼굴 전체에 부드럽게</text>
  <text x="40" y="454" font-family="Arial, sans-serif" font-size="8.5" fill="#6B6B6B">펴 바르세요. Apply an appropriate amount to face.</text>

  <!-- Divider -->
  <line x1="40" y1="466" x2="380" y2="466" stroke="#DEDEDD" stroke-width="0.5"/>

  <!-- Manufacturer info -->
  <text x="40" y="486" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1a1a1a" letter-spacing="1">MANUFACTURER</text>
  <text x="40" y="502" font-family="Arial, sans-serif" font-size="8.5" fill="#6B6B6B">SEOUL BEAUTY LAB Co., Ltd.</text>
  <text x="40" y="516" font-family="Arial, sans-serif" font-size="8.5" fill="#6B6B6B">123 Gangnam-daero, Seoul, Korea</text>
  <text x="40" y="530" font-family="Arial, sans-serif" font-size="8" fill="#9F9F9F">(US 배급사 주소 누락)</text>

  <!-- Divider -->
  <line x1="40" y1="544" x2="380" y2="544" stroke="#DEDEDD" stroke-width="0.5"/>

  <!-- Bottom symbols area -->
  <!-- PAO symbol (12M) -->
  <circle cx="60" cy="590" r="22" fill="none" stroke="#6B6B6B" stroke-width="1.5"/>
  <path d="M 44 580 Q 60 565 76 580" fill="none" stroke="#6B6B6B" stroke-width="1.5"/>
  <text x="60" y="594" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a" text-anchor="middle">12M</text>

  <!-- Recycling symbol (simplified) -->
  <text x="110" y="598" font-family="Arial, sans-serif" font-size="28" fill="#6B6B6B" text-anchor="middle">♻</text>

  <!-- Country of Origin -->
  <text x="210" y="580" font-family="Arial, sans-serif" font-size="8.5" fill="#9F9F9F" text-anchor="middle">Made in Korea | 대한민국 제조</text>
  <text x="210" y="596" font-family="Arial, sans-serif" font-size="8" fill="#9F9F9F" text-anchor="middle">Best Before: See bottom</text>

  <!-- Barcode area (simplified) -->
  <rect x="290" y="558" width="100" height="65" fill="white" stroke="#DEDEDD" stroke-width="0.5"/>
  <!-- Simplified barcode lines -->
  <rect x="294" y="562" width="1.5" height="45" fill="#1a1a1a"/>
